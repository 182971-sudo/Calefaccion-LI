<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Calefacción</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --text:    #e8eaf0;
      --muted:   #6b7080;
      --accent:  #f97316;
      --green:   #22c55e;
      --red:     #ef4444;
      --radius:  16px;
      --font:    'Inter', sans-serif;
      --mono:    'DM Mono', monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LOGIN ── */
    .login-wrap {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-title { font-size: 18px; font-weight: 600; text-align: center; }
    .login-sub   { font-size: 13px; color: var(--muted); text-align: center; margin-top: -12px; }

    .field { display: flex; flex-direction: column; gap: 6px; }

    .field label {
      font-size: 12px; color: var(--muted); font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .field input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: var(--accent); }
    .login-error { font-size: 13px; color: var(--red); text-align: center; min-height: 18px; }

    /* ── APP ── */
    .app {
      display: none;
      max-width: 420px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      flex-direction: column;
      gap: 12px;
    }
    .app.visible { display: flex; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .header-title { font-size: 15px; font-weight: 600; }
    .header-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .header-right {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 6px;
    }

    .status-pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 500;
      padding: 5px 10px; border-radius: 99px;
      background: rgba(34,197,94,0.12);
      color: var(--green);
      border: 1px solid rgba(34,197,94,0.25);
      transition: all 0.3s;
    }
    .status-pill.offline {
      background: rgba(107,112,128,0.12);
      color: var(--muted);
      border-color: rgba(107,112,128,0.25);
    }

    .btn-logout {
      font-size: 11px; color: var(--muted);
      background: none; border: none; cursor: pointer;
      font-family: var(--font); padding: 0; text-decoration: underline;
    }

    .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .dot.pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Temperaturas ── */
    .temps { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .temp-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 16px; text-align: center;
    }
    .temp-card.agua {
      border-color: rgba(249,115,22,0.35);
      background: rgba(249,115,22,0.06);
    }
    .temp-icon  { font-size: 22px; margin-bottom: 6px; }
    .temp-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
    .temp-value { font-family: var(--mono); font-size: 28px; font-weight: 500; line-height: 1; }
    .temp-card.agua .temp-value { color: var(--accent); }
    .temp-unit  { font-size: 14px; color: var(--muted); }

    /* ── Contador Go Home ── */
    .timer-card {
      background: rgba(249,115,22,0.06);
      border: 1px solid rgba(249,115,22,0.35);
      border-radius: var(--radius);
      padding: 18px; text-align: center;
      display: none;
    }
    .timer-card.visible { display: block; }
    .timer-label { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .timer-value { font-family: var(--mono); font-size: 36px; font-weight: 500; color: var(--accent); }

    /* ── Estado ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

    .card-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--muted);
      padding: 14px 18px 10px; border-bottom: 1px solid var(--border);
    }

    .estado-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 18px; border-bottom: 1px solid var(--border);
    }
    .estado-row:last-child { border-bottom: none; }
    .estado-label { font-size: 14px; color: var(--muted); }

    .badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 13px; font-weight: 500;
      padding: 4px 10px; border-radius: 99px;
    }
    .badge.on  { background: rgba(34,197,94,0.12);  color: var(--green); }
    .badge.off { background: rgba(107,112,128,0.12); color: var(--muted); }
    .badge.go  { background: rgba(249,115,22,0.12);  color: var(--accent); }

    /* ── Botones ── */
    .botones { display: flex; flex-direction: column; gap: 10px; }

    .btn {
      width: 100%; padding: 18px; border: none; border-radius: var(--radius);
      font-family: var(--font); font-size: 16px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:disabled:active { transform: none; }
    .btn-go   { background: var(--accent); color: #fff; }
    .btn-stop { background: transparent; color: var(--red); border: 1.5px solid var(--red); }

    /* ── Error banner ── */
    .error-banner {
      display: none;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius); padding: 12px 16px;
      font-size: 13px; color: var(--red); text-align: center;
    }
    .error-banner.visible { display: block; }
  </style>
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div>
      <div class="login-title">🔥 Sistema de Calefacción</div>
      <div class="login-sub">Ingresá para continuar</div>
    </div>
    <div class="field">
      <label>Correo</label>
      <input type="email" id="loginEmail" placeholder="usuario@correo.com" />
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" />
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="btn btn-go" id="btnLogin">Ingresar</button>
  </div>
</div>

<!-- ══════════════ APP ══════════════ -->
<div class="app" id="appWrap">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="header-title">Sistema de Calefacción</div>
      <div class="header-sub">Control remoto</div>
    </div>
    <div class="header-right">
      <div class="status-pill offline" id="statusPill">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Conectando</span>
      </div>
      <button class="btn-logout" id="btnLogout">Cerrar sesión</button>
    </div>
  </div>

  <!-- Error sensor -->
  <div class="error-banner" id="errorBanner">⚠️ Error en sensor de temperatura</div>

  <!-- Temperaturas -->
  <div class="temps">
    <div class="temp-card">
      <div class="temp-icon">🌡</div>
      <div class="temp-label">Ambiente</div>
      <div class="temp-value" id="tempAmbiente">--<span class="temp-unit"> °C</span></div>
    </div>
    <div class="temp-card agua">
      <div class="temp-icon">🔥</div>
      <div class="temp-label">Agua</div>
      <div class="temp-value" id="tempAgua">--<span class="temp-unit"> °C</span></div>
    </div>
  </div>

  <!-- Contador Go Home -->
  <div class="timer-card" id="timerCard">
    <div class="timer-label">⏱ Tiempo encendido</div>
    <div class="timer-value" id="timerValue">00:00:00</div>
  </div>

  <!-- Estado -->
  <div class="card">
    <div class="card-title">Estado del sistema</div>
    <div class="estado-row">
      <span class="estado-label">Calefactor</span>
      <span class="badge off" id="badgeSSR">● Apagado</span>
    </div>
    <div class="estado-row">
      <span class="estado-label">Bomba</span>
      <span class="badge off" id="badgeBomba">● Apagada</span>
    </div>
    <div class="estado-row">
      <span class="estado-label">Modo</span>
      <span class="badge off" id="badgeModo">— En espera</span>
    </div>
  </div>

  <!-- Botones -->
  <div class="botones">
    <button class="btn btn-go"  id="btnGoHome">🏠 VOY A CASA</button>
    <button class="btn btn-stop" id="btnDetener">⛔ DETENER</button>
  </div>

</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, onValue, update }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:      "AIzaSyCQuPl1iSec77AW3nLFygB7YfQYb9T2eUA",
    databaseURL: "https://esp32systemheating-default-rtdb.firebaseio.com",
    projectId:   "esp32systemheating",
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getDatabase(app);
  const $    = id => document.getElementById(id);

  // ── Contador de tiempo encendido ──
  let goHomeInicioMs       = null;
  let timerInterval        = null;
  let estadoAnteriorGoHome = false;

  function iniciarContador() {
    if (timerInterval) return;
    goHomeInicioMs = Date.now();
    $("timerCard").classList.add("visible");
    timerInterval = setInterval(() => {
      const seg = Math.floor((Date.now() - goHomeInicioMs) / 1000);
      const h   = String(Math.floor(seg / 3600)).padStart(2, "0");
      const m   = String(Math.floor((seg % 3600) / 60)).padStart(2, "0");
      const s   = String(seg % 60).padStart(2, "0");
      $("timerValue").textContent = `${h}:${m}:${s}`;
    }, 1000);
  }

  function detenerContador() {
    clearInterval(timerInterval);
    timerInterval  = null;
    goHomeInicioMs = null;
    $("timerCard").classList.remove("visible");
    $("timerValue").textContent = "00:00:00";
  }

  // ── Helpers UI ──
  function setBadge(el, on, labelOn, labelOff, tipo) {
    el.className   = "badge " + (on ? (tipo || "on") : "off");
    el.textContent = "● " + (on ? labelOn : labelOff);
  }

  function setOnline(online) {
    $("statusDot").className    = online ? "dot pulse" : "dot";
    $("statusText").textContent = online ? "En línea" : "Sin datos";
    $("statusPill").className   = "status-pill" + (online ? "" : " offline");
  }

  // ── Vistas ──
  function mostrarApp() {
    $("loginWrap").style.display = "none";
    $("appWrap").classList.add("visible");
    iniciarFirebase();
  }

  function mostrarLogin() {
    $("appWrap").classList.remove("visible");
    $("loginWrap").style.display = "flex";
    detenerContador();
  }

  // ── Firebase Realtime ──
  let fbIniciado = false;
  let ultimoDato = 0;

  function iniciarFirebase() {
    if (fbIniciado) return;
    fbIniciado = true;

    onValue(ref(db, "/estado"), snap => {
      const d = snap.val();
      if (!d) return;

      ultimoDato = Date.now();
      setOnline(true);

      $("tempAgua").innerHTML     = (d.tempAgua    ?? "--") + '<span class="temp-unit"> °C</span>';
      $("tempAmbiente").innerHTML = (d.tempAmbiente ?? "--") + '<span class="temp-unit"> °C</span>';

      setBadge($("badgeSSR"),   d.ssr,          "Encendido", "Apagado");
      setBadge($("badgeBomba"), d.bomba,        "Encendida", "Apagada");
      setBadge($("badgeModo"),  d.goHomeActivo, "Go Home",   "En espera", "go");

      $("errorBanner").classList.toggle("visible", !!d.sensorError);
      $("btnGoHome").disabled  = !!d.goHomeActivo;
      $("btnDetener").disabled = !d.goHomeActivo;

      // Contador
      if (d.goHomeActivo && !estadoAnteriorGoHome) iniciarContador();
      if (!d.goHomeActivo && estadoAnteriorGoHome) detenerContador();
      estadoAnteriorGoHome = !!d.goHomeActivo;
    });

    setInterval(() => {
      if (Date.now() - ultimoDato > 15000) setOnline(false);
    }, 5000);
  }

  // ── Login ──
  $("btnLogin").addEventListener("click", async () => {
    const email = $("loginEmail").value.trim();
    const pass  = $("loginPass").value;
    $("loginError").textContent  = "";
    $("btnLogin").disabled       = true;
    $("btnLogin").textContent    = "Ingresando...";
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (e) {
      $("loginError").textContent = "Correo o contraseña incorrectos";
      $("btnLogin").disabled      = false;
      $("btnLogin").textContent   = "Ingresar";
    }
  });

  // ── Logout ──
  $("btnLogout").addEventListener("click", () => signOut(auth));

  // ── Auth state ──
  onAuthStateChanged(auth, user => {
    if (user) mostrarApp();
    else      mostrarLogin();
  });

  // ── Botón Go Home ──
  $("btnGoHome").addEventListener("click", () => {
    update(ref(db, "/control"), { goHome: true, cancelar: false });
  });

  // ── Botón Detener ──
  $("btnDetener").addEventListener("click", () => {
    update(ref(db, "/control"), { cancelar: true });
  });

</script>
</body>
</html>
